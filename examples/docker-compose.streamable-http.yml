services:
  mytube-mcp:
    image: ghcr.io/franklioxygen/mytube-mcp:latest
    # To build locally instead of pulling the published image, comment out
    # the `image:` line above and uncomment the line below:
    # build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      MYTUBE_BASE_URL: https://mytube.example.com
      MYTUBE_AUTH_MODE: api-key
      MYTUBE_API_KEY: ${MYTUBE_API_KEY}
      MCP_TRANSPORT: http
      MCP_HTTP_BIND: 0.0.0.0
      MCP_HTTP_PORT: 3100
      MCP_HTTP_BEARER_TOKEN: ${MCP_HTTP_BEARER_TOKEN}
